<!DOCTYPE html>
<html>
<head>
    <title>Status</title>
    <style>
        body { font-family: Arial; padding: 40px; }
        .status-box { width: 350px; margin: auto; }
        .ok { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="status-box">
        <h2>System Status</h2>
        <p><strong>Account Status:</strong> <span class="ok">Active</span></p>
        <p><strong>Last Login:</strong> 2025-12-10 14:32</p>
        <p><strong>Subscription:</strong> Premium</p>
    </div>
</body>
</html>
